name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      working-directory: ./frontend-2
      run: npm install --legacy-peer-deps
      
    - name: Build project
      working-directory: ./frontend-2
      run: npm run build
      env:
        CI: false
        REACT_APP_FIREBASE_API_KEY: AIzaSyCCrLwW0eavjsq-x2m-Nw_vRe3GcAkGEJU
        REACT_APP_FIREBASE_AUTH_DOMAIN: heroic-kart-407b1.firebaseapp.com
        REACT_APP_FIREBASE_PROJECT_ID: heroic-kart-407b1
        REACT_APP_FIREBASE_STORAGE_BUCKET: heroic-kart-407b1.firebasestorage.app
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: 148331533545
        REACT_APP_FIREBASE_APP_ID: 1:148331533545:web:a8cfc31ce950bee0380c78
        
    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './frontend-2/build'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
